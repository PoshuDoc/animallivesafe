kind = "web"
previewPath = "/"
title = "PashuDoc - পশু চিকিৎসক খোঁজার অ্যাপ"
version = "1.0.0"
id = "artifacts/pashudoc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25649

[services.development]
run = "pnpm --filter @workspace/pashudoc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pashudoc", "run", "build" ]
publicDir = "artifacts/pashudoc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25649"
BASE_PATH = "/"
