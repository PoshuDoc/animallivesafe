openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: PashuDoc API - Veterinary Doctor Finding Platform

servers:
  - url: /api
    description: Base API path

tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: doctors
    description: Veterinary doctors
  - name: appointments
    description: Appointment management
  - name: reviews
    description: Doctor reviews
  - name: admin
    description: Admin operations
  - name: stats
    description: Statistics and dashboards

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /doctors:
    get:
      operationId: listDoctors
      tags: [doctors]
      summary: List approved doctors
      parameters:
        - name: district
          in: query
          schema:
            type: string
        - name: specialty
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: List of doctors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorListResponse"

    post:
      operationId: createDoctor
      tags: [doctors]
      summary: Register as a doctor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDoctorBody"
      responses:
        "201":
          description: Doctor profile created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/featured:
    get:
      operationId: listFeaturedDoctors
      tags: [doctors]
      summary: List featured doctors
      responses:
        "200":
          description: Featured doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /doctors/{id}:
    get:
      operationId: getDoctor
      tags: [doctors]
      summary: Get doctor details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"
        "404":
          description: Not found

    patch:
      operationId: updateDoctor
      tags: [doctors]
      summary: Update doctor profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDoctorBody"
      responses:
        "200":
          description: Updated doctor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /doctors/{id}/reviews:
    get:
      operationId: getDoctorReviews
      tags: [reviews]
      summary: Get reviews for a doctor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments for the current user
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentBody"
      responses:
        "201":
          description: Appointment booked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get appointment details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update appointment status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentBody"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /reviews:
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review for a doctor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /stats/overview:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get platform overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /admin/doctors:
    get:
      operationId: adminListDoctors
      tags: [admin]
      summary: Admin - list all doctors
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Doctors list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /admin/doctors/{id}/approve:
    patch:
      operationId: approveDoctor
      tags: [admin]
      summary: Admin - approve or reject doctor
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveDoctorBody"
      responses:
        "200":
          description: Doctor status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Doctor"

  /admin/appointments:
    get:
      operationId: adminListAppointments
      tags: [admin]
      summary: Admin - list all appointments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/reviews/{id}:
    delete:
      operationId: deleteReview
      tags: [admin]
      summary: Admin - delete a review
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Review deleted

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [farmer, doctor]
        district:
          type: string
      required:
        - name
        - phone
        - password
        - role

    LoginBody:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required:
        - phone
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [farmer, doctor, admin]
        district:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - role
        - createdAt

    Doctor:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        phone:
          type: string
        specialties:
          type: array
          items:
            type: string
        district:
          type: string
        upazila:
          type: string
        clinicName:
          type: string
        bio:
          type: string
        yearsExperience:
          type: integer
        consultationFee:
          type: integer
        status:
          type: string
          enum: [pending, approved, rejected]
        isFeatured:
          type: boolean
        averageRating:
          type: number
        totalReviews:
          type: integer
        totalAppointments:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - phone
        - specialties
        - district
        - status
        - isFeatured
        - createdAt

    CreateDoctorBody:
      type: object
      properties:
        specialties:
          type: array
          items:
            type: string
        district:
          type: string
        upazila:
          type: string
        clinicName:
          type: string
        bio:
          type: string
        yearsExperience:
          type: integer
        consultationFee:
          type: integer
      required:
        - specialties
        - district

    UpdateDoctorBody:
      type: object
      properties:
        specialties:
          type: array
          items:
            type: string
        district:
          type: string
        upazila:
          type: string
        clinicName:
          type: string
        bio:
          type: string
        yearsExperience:
          type: integer
        consultationFee:
          type: integer

    DoctorListResponse:
      type: object
      properties:
        doctors:
          type: array
          items:
            $ref: "#/components/schemas/Doctor"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - doctors
        - total
        - page
        - totalPages

    Appointment:
      type: object
      properties:
        id:
          type: integer
        farmerId:
          type: integer
        doctorId:
          type: integer
        farmerName:
          type: string
        doctorName:
          type: string
        animalType:
          type: string
        animalDescription:
          type: string
        appointmentDate:
          type: string
          format: date
        appointmentTime:
          type: string
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - farmerId
        - doctorId
        - animalType
        - appointmentDate
        - appointmentTime
        - status
        - createdAt

    CreateAppointmentBody:
      type: object
      properties:
        doctorId:
          type: integer
        animalType:
          type: string
        animalDescription:
          type: string
        appointmentDate:
          type: string
          format: date
        appointmentTime:
          type: string
        notes:
          type: string
      required:
        - doctorId
        - animalType
        - appointmentDate
        - appointmentTime

    UpdateAppointmentBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        notes:
          type: string

    Review:
      type: object
      properties:
        id:
          type: integer
        farmerId:
          type: integer
        doctorId:
          type: integer
        appointmentId:
          type: integer
        farmerName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - farmerId
        - doctorId
        - rating
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        doctorId:
          type: integer
        appointmentId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required:
        - doctorId
        - rating

    PlatformStats:
      type: object
      properties:
        totalDoctors:
          type: integer
        totalFarmers:
          type: integer
        totalAppointments:
          type: integer
        totalDistricts:
          type: integer
      required:
        - totalDoctors
        - totalFarmers
        - totalAppointments
        - totalDistricts

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalDoctors:
          type: integer
        pendingDoctors:
          type: integer
        approvedDoctors:
          type: integer
        totalAppointments:
          type: integer
        pendingAppointments:
          type: integer
        completedAppointments:
          type: integer
        totalReviews:
          type: integer
      required:
        - totalUsers
        - totalDoctors
        - pendingDoctors
        - approvedDoctors
        - totalAppointments
        - pendingAppointments
        - completedAppointments
        - totalReviews

    ApproveDoctorBody:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
        isFeatured:
          type: boolean
      required:
        - status
